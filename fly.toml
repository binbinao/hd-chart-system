app = 'hd-chart-system'
primary_region = 'hkg'

[build]

[env]
  PORT = '8080'
  HD_DB_PATH = '/data/hd_records.db'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'hd_data'
  destination = '/data'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
